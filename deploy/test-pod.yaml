---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-demo
spec:
  # 调度到虚拟节点（替换为你的 VK_NODE_NAME）
  nodeName: ssh-node-192-168-1-201

  tolerations:
    - key: "virtual-kubelet.io/provider"
      operator: "Equal"
      value: "ssh-compose"
      effect: "NoSchedule"

  containers:
    - name: nginx
      image: m.daocloud.io/docker.io/library/nginx:latest
      ports:
        - containerPort: 80
          hostPort: 8080
      resources:
        limits:
          cpu: "0.5"
          memory: "512Mi"
